<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedTender Watch — EU & UK Medical Device Tenders</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#1a1a1a;line-height:1.5}
header{background:#fff;border-bottom:1px solid #e5e7eb;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-size:18px;font-weight:600;color:#1a1a1a}
.logo span{color:#2563eb}
.last-updated{font-size:12px;color:#6b7280}
.container{max-width:1100px;margin:0 auto;padding:24px 16px}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
@media(max-width:600px){.metrics{grid-template-columns:repeat(2,1fr)}}
.metric{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px}
.metric-label{font-size:12px;color:#6b7280;margin-bottom:4px}
.metric-value{font-size:24px;font-weight:600;color:#1a1a1a}
.metric-sub{font-size:11px;color:#9ca3af;margin-top:2px}
.filters{background:#fff;border:1px solid #e5e7eb;border-radius:10px;padding:16px;margin-bottom:20px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.filters input{flex:1;min-width:200px;height:36px;padding:0 12px;border:1px solid #e5e7eb;border-radius:8px;font-size:14px;color:#1a1a1a;background:#f9fafb}
.filters input:focus{outline:none;border-color:#2563eb}
.filters select{height:36px;padding:0 10px;border:1px solid #e5e7eb;border-radius:8px;font-size:13px;color:#1a1a1a;background:#f9fafb;cursor:pointer}
.filters select:focus{outline:none;border-color:#2563eb}
.results-count{font-size:13px;color:#6b7280;margin-bottom:12px}
.cards{display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:18px 20px;transition:border-color 0.15s,box-shadow 0.15s}
.card:hover{border-color:#93c5fd;box-shadow:0 2px 8px rgba(37,99,235,0.08)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:10px}
.card-title{font-size:15px;font-weight:600;color:#1a1a1a;line-height:1.4}
.badges{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.badge{font-size:11px;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
.badge-eu{background:#dbeafe;color:#1e40af}
.badge-uk{background:#dcfce7;color:#166534}
.badge-score{background:#f3f4f6;color:#4b5563}
.badge-score.s4{background:#d1fae5;color:#065f46}
.badge-score.s3{background:#fef9c3;color:#713f12}
.card-meta{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:10px}
.meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7280}
.meta-item svg{width:14px;height:14px;flex-shrink:0}
.card-summary{font-size:13px;color:#374151;line-height:1.6;border-top:1px solid #f3f4f6;padding-top:10px;margin-top:4px}
.card-detail{margin-top:10px;font-size:12px;color:#6b7280;line-height:1.6}
.card-detail strong{color:#374151}
.card-actions{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;font-size:12px;padding:6px 14px;border-radius:8px;border:1px solid #e5e7eb;background:#fff;color:#374151;cursor:pointer;text-decoration:none;font-family:inherit;transition:background 0.1s}
.btn:hover{background:#f9fafb}
.btn-primary{background:#2563eb;color:#fff;border-color:#2563eb}
.btn-primary:hover{background:#1d4ed8}
.expand-detail{display:none}
.expand-detail.open{display:block}
.pagination{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:24px;font-size:13px;color:#6b7280}
.pagination button{padding:6px 16px;border:1px solid #e5e7eb;border-radius:8px;background:#fff;color:#374151;cursor:pointer;font-size:13px;transition:background 0.1s}
.pagination button:hover:not(:disabled){background:#f9fafb}
.pagination button:disabled{opacity:0.4;cursor:default}
.loading{text-align:center;padding:60px;color:#6b7280;font-size:15px}
.empty{text-align:center;padding:40px;color:#9ca3af;font-size:14px}
.pill-bar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.pill{font-size:12px;padding:4px 12px;border-radius:20px;border:1px solid #e5e7eb;background:#fff;color:#6b7280;cursor:pointer;transition:all 0.1s}
.pill.active{background:#2563eb;color:#fff;border-color:#2563eb}
footer{text-align:center;padding:32px;font-size:12px;color:#9ca3af;margin-top:24px;border-top:1px solid #e5e7eb}
</style>
</head>
<body>

<header>
  <div class="logo">Med<span>Tender</span>Watch</div>
  <nav style="display:flex;align-items:center;gap:8px">
    <a href="manufacturer-demo.html" style="font-size:12px;padding:5px 12px;border-radius:8px;background:#dbeafe;color:#1e40af;text-decoration:none;font-weight:500">Manufacturer demo</a>
    <a href="distributor-demo.html" style="font-size:12px;padding:5px 12px;border-radius:8px;background:#ccfbf1;color:#065f46;text-decoration:none;font-weight:500">Distributor demo</a>
  </nav>
  <div class="last-updated" id="last-updated">Loading...</div>
</header>

<div class="container">
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-label">Loading</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Loading</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Loading</div><div class="metric-value">—</div></div>
    <div class="metric"><div class="metric-label">Loading</div><div class="metric-value">—</div></div>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search tenders, buyers, devices..." />
    <select id="fSource">
      <option value="">All sources</option>
      <option value="EU">EU (TED)</option>
      <option value="UK">UK (Find a Tender)</option>
    </select>
    <select id="fScore">
      <option value="">All quality scores</option>
      <option value="4">4/4 — highest quality</option>
      <option value="3">3/4 and above</option>
      <option value="2">2/4 and above</option>
    </select>
    <select id="fCountry"><option value="">All countries</option></select>
  </div>

  <div class="pill-bar" id="pill-bar"></div>
  <div class="results-count" id="results-count"></div>
  <div class="cards" id="cards"><div class="loading">Loading tenders...</div></div>
  <div class="pagination" id="pagination"></div>
</div>

<footer>
  MedTender Watch — Automated EU &amp; UK medical device tender monitoring<br>
  Data refreshed weekly from TED (Tenders Electronic Daily) and UK Find a Tender Service
</footer>

<script>
const GITHUB_USER = 'henryhall1993';
const GITHUB_REPO = 'ted-tender-monitor';
const DATA_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/results/tenders.json`;

const COUNTRY_NAMES = {GBR:'United Kingdom',DEU:'Germany',FIN:'Finland',POL:'Poland',EST:'Estonia',CZE:'Czechia',SWE:'Sweden',NOR:'Norway',FRA:'France',ITA:'Italy',BEL:'Belgium',AUT:'Austria',BGR:'Bulgaria',HRV:'Croatia',DNK:'Denmark',SVK:'Slovakia',CHE:'Switzerland',NLD:'Netherlands',ESP:'Spain',LTU:'Lithuania',LVA:'Latvia',MLT:'Malta',LUX:'Luxembourg',SVN:'Slovenia',GRC:'Greece',ISL:'Iceland',PRT:'Portugal'};

let ALL = [];
let expanded = {};
let page = 1;
const PER = 20;

function fmtVal(v){
  if(!v) return null;
  const n = parseFloat(v);
  if(isNaN(n)||n<=0) return null;
  if(n>=1e9) return '€'+Math.round(n/1e8)/10+'B';
  if(n>=1e6) return '€'+Math.round(n/1e6)+'M';
  if(n>=1e3) return '€'+Math.round(n/1e3)+'K';
  return '€'+Math.round(n).toLocaleString();
}

function icon(path){
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${path}</svg>`;
}

const icons = {
  building: icon('<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>'),
  pin: icon('<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>'),
  cal: icon('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>'),
  euro: icon('<line x1="12" y1="2" x2="12" y2="22"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>'),
  link: icon('<path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>'),
  down: icon('<polyline points="6 9 12 15 18 9"/>'),
  up: icon('<polyline points="18 15 12 9 6 15"/>'),
};

function getFiltered(){
  const q = document.getElementById('search').value.toLowerCase();
  const src = document.getElementById('fSource').value;
  const score = parseInt(document.getElementById('fScore').value)||0;
  const country = document.getElementById('fCountry').value;
  return ALL.filter(r => {
    if(src && r.source !== src) return false;
    if(score && parseInt(r.quality_score||0) < score) return false;
    if(country && r.country !== country) return false;
    if(q){
      const hay = [r.original_title,r.english_summary,r.buyer_name,r.what_they_want].join(' ').toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderMetrics(filtered){
  const total = filtered.length;
  const withVal = filtered.filter(r=>r.estimated_value_eur&&parseFloat(r.estimated_value_eur)>0);
  const totalVal = withVal.reduce((s,r)=>s+parseFloat(r.estimated_value_eur),0);
  const s4 = filtered.filter(r=>parseInt(r.quality_score||0)>=4).length;
  const uk = filtered.filter(r=>r.source==='UK').length;
  const eu = filtered.filter(r=>r.source==='EU').length;

  function fmtBig(n){
    if(n>=1e9) return '€'+Math.round(n/1e8)/10+'B';
    if(n>=1e6) return '€'+Math.round(n/1e6)+'M';
    if(n>=1e3) return '€'+Math.round(n/1e3)+'K';
    return '€'+Math.round(n);
  }

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Total tenders</div><div class="metric-value">${total}</div><div class="metric-sub">EU: ${eu} &nbsp;|&nbsp; UK: ${uk}</div></div>
    <div class="metric"><div class="metric-label">Total value (known)</div><div class="metric-value">${fmtBig(totalVal)}</div><div class="metric-sub">${withVal.length} tenders with values</div></div>
    <div class="metric"><div class="metric-label">High quality (4/4)</div><div class="metric-value">${s4}</div><div class="metric-sub">${Math.round(s4/Math.max(total,1)*100)}% of results</div></div>
    <div class="metric"><div class="metric-label">Countries covered</div><div class="metric-value">${new Set(filtered.map(r=>r.country)).size}</div><div class="metric-sub">Across EU + UK</div></div>
  `;
}

function renderPills(filtered){
  const sources = ['EU','UK'];
  const bar = document.getElementById('pill-bar');
  const src = document.getElementById('fSource').value;
  bar.innerHTML = sources.map(s => {
    const count = filtered.filter(r=>r.source===s).length;
    const active = src===s;
    return `<span class="pill${active?' active':''}" onclick="document.getElementById('fSource').value='${active?'':s}';page=1;render()">${s==='EU'?'🇪🇺 EU':'🇬🇧 UK'} &nbsp;${count}</span>`;
  }).join('');
}

function renderCards(filtered){
  const el = document.getElementById('cards');
  document.getElementById('results-count').textContent = `Showing ${Math.min((page-1)*PER+1,filtered.length)}–${Math.min(page*PER,filtered.length)} of ${filtered.length} tenders`;

  if(!filtered.length){
    el.innerHTML='<div class="empty">No tenders match your current filters</div>';
    return;
  }

  const slice = filtered.slice((page-1)*PER, page*PER);
  el.innerHTML = slice.map(r => {
    const score = parseInt(r.quality_score||0);
    const scoreClass = score>=4?'s4':score>=3?'s3':'';
    const val = fmtVal(r.estimated_value_eur);
    const country = COUNTRY_NAMES[r.country]||r.country;
    const isExp = expanded[r.notice_id];
    const hasWhat = r.what_they_want && r.what_they_want !== 'NOT FOUND';
    const hasElig = r.eligibility_requirements && r.eligibility_requirements !== 'NOT FOUND';
    const hasEval = r.evaluation_criteria && r.evaluation_criteria !== 'NOT FOUND';

    return `<div class="card">
      <div class="card-top">
        <div class="card-title">${r.original_title}</div>
        <div class="badges">
          <span class="badge badge-${r.source.toLowerCase()}">${r.source==='UK'?'🇬🇧 UK':'🇪🇺 EU'}</span>
          <span class="badge badge-score ${scoreClass}">${score}/4</span>
        </div>
      </div>
      <div class="card-meta">
        <span class="meta-item">${icons.building}${r.buyer_name.length>55?r.buyer_name.slice(0,55)+'…':r.buyer_name}</span>
        <span class="meta-item">${icons.pin}${country}</span>
        ${r.deadline?`<span class="meta-item">${icons.cal}${r.deadline}</span>`:''}
        ${val?`<span class="meta-item">${icons.euro}${val}</span>`:''}
      </div>
      ${r.english_summary?`<div class="card-summary">${r.english_summary}</div>`:''}
      <div class="expand-detail${isExp?' open':''}">
        ${hasWhat?`<div class="card-detail" style="margin-top:10px"><strong>What they want:</strong><br>${r.what_they_want}</div>`:''}
        ${hasElig?`<div class="card-detail" style="margin-top:8px"><strong>Eligibility:</strong><br>${r.eligibility_requirements}</div>`:''}
        ${hasEval?`<div class="card-detail" style="margin-top:8px"><strong>Evaluation criteria:</strong><br>${r.evaluation_criteria}</div>`:''}
        ${r.language_detected&&r.language_detected!=='NOT FOUND'?`<div class="card-detail" style="margin-top:8px"><strong>Language:</strong> ${r.language_detected}</div>`:''}
      </div>
      <div class="card-actions">
        <a class="btn btn-primary" href="${r.tender_url}" target="_blank" rel="noopener">${icons.link}View tender</a>
        ${(hasWhat||hasElig||hasEval)?`<button class="btn" onclick="expanded['${r.notice_id}']=!expanded['${r.notice_id}'];render()">${isExp?icons.up+' Less detail':icons.down+' More detail'}</button>`:''}
      </div>
    </div>`;
  }).join('');
}

function renderPagination(filtered){
  const pages = Math.ceil(filtered.length/PER);
  const el = document.getElementById('pagination');
  if(pages<=1){el.innerHTML='';return;}
  el.innerHTML = `
    <button onclick="page=Math.max(1,page-1);render();window.scrollTo(0,0)" ${page<=1?'disabled':''}>← Previous</button>
    <span>Page ${page} of ${pages}</span>
    <button onclick="page=Math.min(${pages},page+1);render();window.scrollTo(0,0)" ${page>=pages?'disabled':''}>Next →</button>
  `;
}

function populateCountries(){
  const sel = document.getElementById('fCountry');
  const countries = [...new Set(ALL.map(r=>r.country))].sort((a,b)=>(COUNTRY_NAMES[a]||a).localeCompare(COUNTRY_NAMES[b]||b));
  countries.forEach(c=>{
    const o = document.createElement('option');
    o.value=c;
    o.textContent=(COUNTRY_NAMES[c]||c);
    sel.appendChild(o);
  });
}

function render(){
  const filtered = getFiltered();
  renderMetrics(filtered);
  renderPills(filtered);
  renderCards(filtered);
  renderPagination(filtered);
}

async function loadData(){
  try {
    const res = await fetch(DATA_URL);
    if(!res.ok) throw new Error('Failed to fetch data');
    const data = await res.json();
    ALL = data.tenders || [];
    document.getElementById('last-updated').textContent = `Last updated: ${data.generated||'unknown'}`;
    populateCountries();
    render();
  } catch(e) {
    document.getElementById('cards').innerHTML = '<div class="empty">Could not load tender data. Please try again later.</div>';
    document.getElementById('last-updated').textContent = 'Data unavailable';
    console.error(e);
  }
}

document.getElementById('search').addEventListener('input',()=>{page=1;render()});
document.getElementById('fSource').addEventListener('change',()=>{page=1;render()});
document.getElementById('fScore').addEventListener('change',()=>{page=1;render()});
document.getElementById('fCountry').addEventListener('change',()=>{page=1;render()});

loadData();
</script>
</body>
</html>
