name: TED Tender Monitor

on:
  schedule:
    - cron: '0 7 * * 1'
  workflow_dispatch:

jobs:
  fetch-and-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run TED fetcher
        run: python scripts/fetcher.py

      - name: Run UK fetcher
        run: python scripts/uk_fetcher.py

      - name: Run Scotland fetcher
        run: python scripts/scotland_fetcher.py

      - name: Run Singapore market intelligence fetcher
        run: python scripts/singapore_market_intel_fetcher.py

      # Wales (Sell2Wales): OCDS API returns 500 SQL errors on all requests including
      # the vendor's own documented example URLs. Download portal requires browser
      # automation (ASP.NET WebForms with ViewState). Skipped until API is fixed.
      # - name: Run Wales fetcher
      #   run: python scripts/wales_fetcher.py

      # Northern Ireland (eTendersNI): No public API. Runs on closed European Dynamics
      # EPPS platform with no OCDS feed, no bulk download, and no cross-posting to
      # Contracts Finder. Not listed in OCP Data Registry. Skipped until access changes.
      # - name: Run NI fetcher
      #   run: python scripts/etendersni_fetcher.py

      - name: Run parser on TED results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/parser.py

      - name: Run parser on UK results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/uk_parser.py

      - name: Run parser on Scotland results
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/scotland_parser.py

      - name: Convert CSVs to JSON for website
        run: python scripts/csv_to_json.py

      - name: Save results to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add results/
          git diff --staged --quiet || git commit -m "Weekly tender update $(date +'%Y-%m-%d')"
          git push
