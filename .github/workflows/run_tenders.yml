name: TED Tender Monitor

on:
  schedule:
    # Runs every Monday at 7am UTC (Coordinated Universal Time)
    - cron: '0 7 * * 1'
  workflow_dispatch:
    # This allows you to run it manually anytime from GitHub

jobs:
  fetch-and-parse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run fetcher
        run: python scripts/fetcher.py

      - name: Run parser
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/parser.py

      - name: Save results to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add results/
          git diff --staged --quiet || git commit -m "Weekly tender update $(date +'%Y-%m-%d')"
          git push
